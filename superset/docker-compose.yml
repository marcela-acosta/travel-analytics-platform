version: "3.9"

x-env: &env
  DB_HOST: db
  DB_NAME: superset
  DB_USER: superset
  DB_PASS: superset
  REDIS_HOST: redis
  SUPERSET_SECRET_KEY: "pipeline-health-monitor-superset-2026"
  SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "superset"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - superset_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  superset-init:
    build: .
    command: ["/bin/bash", "/app/superset/init.sh"]
    environment:
      <<: *env
    volumes:
      - ../gcp:/app/gcp:ro
      - ./init.sh:/app/superset/init.sh:ro
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  superset:
    build: .
    ports:
      - "8088:8088"
    environment:
      <<: *env
    volumes:
      - ../gcp:/app/gcp:ro
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      superset-init: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped

volumes:
  superset_db:
  superset_redis:
  superset_home:
