version: 2

models:
  - name: gld_dashboard_opportunities
    description: Dashboard-ready opportunity-level CRM table from Silver.
    tests:
      - elementary.volume_anomalies:
          timestamp_column: null
          sensitivity: 3
      - elementary.schema_changes
    columns:
      - name: opportunity_id
        tests:
          - not_null
          - unique
      - name: stage
        tests:
          - not_null
          - accepted_values:
              values: ['Prospecting', 'Qualified', 'Proposal', 'Negotiation', 'Won', 'Lost']
      - name: value
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
          - elementary.column_anomalies:
              column_anomalies:
                - null_count
                - zero_count

  - name: gld_pipeline_by_stage
    description: Aggregated pipeline metrics by sales stage.
    tests:
      - elementary.volume_anomalies:
          timestamp_column: null
          sensitivity: 3
      - elementary.schema_changes

  - name: gld_conversion_by_agent
    description: Conversion and value metrics by sales agent.
    tests:
      - elementary.volume_anomalies:
          timestamp_column: null
          sensitivity: 3
    columns:
      - name: agent
        tests:
          - not_null
          - unique
      - name: total_opportunities
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: won_opportunities
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: win_rate_pct
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
          - dbt_utils.expression_is_true:
              expression: "<= 100"

  - name: gld_conversion_by_product
    description: Conversion and value metrics by product.
    tests:
      - elementary.volume_anomalies:
          timestamp_column: null
          sensitivity: 3
    columns:
      - name: product
        tests:
          - not_null
          - unique
      - name: total_opportunities
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: won_opportunities
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: win_rate_pct
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
          - dbt_utils.expression_is_true:
              expression: "<= 100"

  - name: gld_stale_opportunities
    description: Opportunities not updated in more than 14 days.

  - name: gld_booking_overview
    description: Aggregated booking metrics by booking status, channel, and currency for dashboard consumption.
    columns:
      - name: booking_status
        description: Booking status from the Silver booking model.
      - name: channel
        description: Sales or acquisition channel used for the booking.
      - name: currency
        description: Currency of the booking amount.
      - name: total_bookings
        description: Total number of bookings in the group.
      - name: total_booking_amount
        description: Sum of booking amounts in the group.
      - name: avg_booking_amount
        description: Average booking amount in the group.
      - name: distinct_customers
        description: Number of distinct customers in the group.
      - name: latest_booking_updated_at
        description: Most recent update timestamp among bookings in the group.

  - name: gld_customer_overview
    description: Aggregated customer metrics by segment, loyalty tier, and country for dashboard consumption.
    columns:
      - name: customer_segment
        description: Customer segment classification.
      - name: loyalty_tier
        description: Loyalty tier assigned to the customer.
      - name: country
        description: Country associated with the customer.
      - name: total_customers
        description: Total number of customers in the group.
      - name: customers_with_email
        description: Number of customers with a non-null email.
      - name: customers_with_phone
        description: Number of customers with a non-null phone.
      - name: latest_customer_updated_at
        description: Most recent update timestamp among customers in the group.

  - name: gld_finance_event_monitor
    description: Monitoring summary of finance-related Silver event domains for dashboard consumption.
    columns:
      - name: domain
        description: Finance event domain summarized in the row.
      - name: total_events
        description: Total number of events in the Silver model.
      - name: first_ingested_at
        description: Earliest ingested timestamp in the Silver model.
      - name: last_ingested_at
        description: Latest ingested timestamp in the Silver model.
      - name: last_staged_at
        description: Latest staged timestamp in the Silver model.

