# ---------------------------------------------------------------------------
# Airflow 2.10 — lightweight setup using LocalExecutor + Postgres
# Memory footprint: ~2 GB (fits on an e2-medium VM).
# Services:
#   - postgres       : metadata database
#   - airflow-init   : one-shot DB migration + admin user creation
#   - airflow-web    : web UI on port 8080
#   - airflow-sched  : DAG scheduler (also runs tasks via LocalExecutor)
# ---------------------------------------------------------------------------

x-airflow-common: &airflow-common
  image: apache/airflow:3.2.1
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/keys/pipeline-sa.json
    PIP_ADDITIONAL_REQUIREMENTS: 'astronomer-cosmos==1.14.1 dbt-core==1.11.8 dbt-bigquery==1.11.1'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./entrypoint-with-deps.sh:/entrypoint-with-deps.sh
    - ../infra/data/keys:/opt/airflow/keys
    - ../dbt:/opt/airflow/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        python3 << 'EOF' || true
        import os
        import sys
        from werkzeug.security import generate_password_hash
        
        os.environ.setdefault('AIRFLOW_HOME', '/home/airflow')
        
        username = os.getenv('_AIRFLOW_WWW_USER_USERNAME', 'admin')
        password = os.getenv('_AIRFLOW_WWW_USER_PASSWORD', 'admin')
        
        # Generate properly hashed password
        hashed_password = generate_password_hash(password, method='scrypt')
        
        # Connect to database and create/update user
        import psycopg2
        from psycopg2.extras import execute_values
        
        conn = psycopg2.connect(
            host='postgres',
            database='airflow',
            user='airflow',
            password='airflow'
        )
        cur = conn.cursor()
        
        # Check if user exists
        cur.execute("SELECT id FROM ab_user WHERE username = %s", (username,))
        user = cur.fetchone()
        
        if user:
            # Update password
            cur.execute(
                "UPDATE ab_user SET password = %s WHERE username = %s",
                (hashed_password, username)
            )
            print(f"User {username} password updated")
        else:
            # Create new user
            cur.execute(
                "INSERT INTO ab_user (username, email, first_name, last_name, password, active, created_on) VALUES (%s, %s, %s, %s, %s, %s, now())",
                (username, 'admin@example.com', 'Admin', 'User', hashed_password, True)
            )
            print(f"User {username} created")
        
        conn.commit()
        cur.close()
        conn.close()
        EOF
    restart: "no"

  airflow-web:
    <<: *airflow-common
    command: api-server
    entrypoint: /entrypoint-with-deps.sh
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-sched:
    <<: *airflow-common
    command: scheduler
    entrypoint: /entrypoint-with-deps.sh
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
